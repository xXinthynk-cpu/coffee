<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAYWAY</title>

<style>
:root{
--black:#050505;
--dark:#111;
--cream:#e6d3b3;
}

*{
margin:0;padding:0;box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
scroll-behavior:smooth;
}

body{
background:var(--black);
color:white;
}

/* NAV */
header{
position:fixed;
width:100%;
background:#000a;
z-index:1000;
}

.nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

.logo{color:var(--cream);font-weight:bold;}

.menu a{
margin-left:20px;
text-decoration:none;
color:white;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
padding:0 40px;
background:
linear-gradient(#000a,#000f),
url('https://images.unsplash.com/photo-1520975916090-3105956dac38');
background-size:cover;
}

.hero h1{font-size:70px;}
.hero span{color:var(--cream);}

/* SECTION */
section{padding:100px 40px}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.product{
cursor:pointer;
}

.product img{
width:100%;
height:300px;
object-fit:cover;
transition:0.4s;
}

.product:hover img{
transform:scale(1.05);
}

.product-info{
margin-top:10px;
}

.price{color:var(--cream)}

/* DETAIL PAGE */
.detail{
display:none;
padding:120px 40px;
}

.detail.active{
display:block;
}

.detail-container{
display:flex;
gap:40px;
flex-wrap:wrap;
}

.detail img{
width:400px;
cursor:pointer;
}

.detail-info{
max-width:400px;
}

/* SIZE */
.sizes button{
margin:5px;
padding:8px 12px;
border:1px solid var(--cream);
background:none;
color:white;
cursor:pointer;
}

.sizes button.active{
background:var(--cream);
color:black;
}

/* QTY */
.qty{
margin:10px 0;
display:flex;
gap:10px;
}

.qty button{
padding:5px 10px;
}

/* CART */
.cart-btn{
position:fixed;
top:20px;
right:20px;
background:var(--cream);
padding:10px;
cursor:pointer;
z-index:1001;
}

.cart{
position:fixed;
right:-350px;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
z-index:1002;
}

.cart.active{right:0}

.cart-item{margin:10px 0}
.total{color:var(--cream)}

/* MODAL IMAGE */
.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:#000d;
justify-content:center;
align-items:center;
z-index:2000;
}

.modal img{
max-width:80%;
max-height:80%;
}

/* FOOTER */
footer{
text-align:center;
padding:40px;
color:#777;
}
</style>
</head>

<body>

<header>
<div class="nav">
<div class="logo">HAYWAY</div>
<div class="menu">
<a href="#home">Home</a>
<a href="#shop">Shop</a>
</div>
</div>
</header>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="cart" id="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<p>Total: Rp <span id="total">0</span></p>
<button onclick="checkout()">Checkout</button>
</div>

<!-- HERO -->
<section class="hero" id="home">
<h1>OWN THE <span>STREET</span></h1>
</section>

<!-- SHOP -->
<section id="shop">
<h2 style="color:var(--cream)">Collection</h2>

<div class="products">

<div class="product" onclick="openDetail('Hoodie Oversize',250000,'https://images.unsplash.com/photo-1503342217505-b0a15ec3261c')">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<div class="product-info">
<h3>Hoodie Oversize</h3>
<p class="price">Rp 250.000</p>
</div>
</div>

<div class="product" onclick="openDetail('Street T-Shirt',150000,'https://images.unsplash.com/photo-1490481651871-ab68de25d43d')">
<img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
<div class="product-info">
<h3>Street T-Shirt</h3>
<p class="price">Rp 150.000</p>
</div>
</div>

</div>
</section>

<!-- DETAIL -->
<section class="detail" id="detailPage">
<div class="detail-container">

<img id="dImg">

<div class="detail-info">
<h2 id="dName"></h2>
<p id="dPrice"></p>

<div class="sizes">
<p>Size:</p>
<button onclick="selectSize(this)">S</button>
<button onclick="selectSize(this)">M</button>
<button onclick="selectSize(this)">L</button>
<button onclick="selectSize(this)">XL</button>
</div>

<div class="qty">
<button onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button onclick="changeQty(1)">+</button>
</div>

<button onclick="addToCart()">Add to Cart</button>

</div>

</div>
</section>

<footer>
<p>© 2026 HAYWAY</p>
</footer>

<!-- MODAL -->
<div class="modal" id="modal">
<img id="modalImg">
</div>

<script>
let cart=[];
let quantity=1;
let currentProduct={};
let selectedSize="M";

/* DETAIL */
function openDetail(name,price,img){
document.getElementById("detailPage").classList.add("active");
window.scrollTo(0,document.getElementById("detailPage").offsetTop);

document.getElementById("dName").innerText=name;
document.getElementById("dPrice").innerText="Rp "+price;
document.getElementById("dImg").src=img;

currentProduct={name,price};
}

/* SIZE */
function selectSize(btn){
document.querySelectorAll(".sizes button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
selectedSize=btn.innerText;
}

/* QTY */
function changeQty(val){
quantity+=val;
if(quantity<1) quantity=1;
document.getElementById("qty").innerText=quantity;
}

/* CART */
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function addToCart(){
cart.push({...currentProduct,qty:quantity,size:selectedSize});
renderCart();
}

function renderCart(){
let container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;

cart.forEach(item=>{
total+=item.price*item.qty;
container.innerHTML+=`
<div class="cart-item">
${item.name} (${item.size}) x${item.qty}
</div>`;
});

document.getElementById("total").innerText=total;
}

/* CHECKOUT */
function checkout(){
let text="Order:%0A";
cart.forEach(item=>{
text+=`- ${item.name} (${item.size}) x${item.qty}%0A`;
});
window.open(`https://wa.me/6281234567890?text=${text}`);
}

/* IMAGE POPUP */
document.getElementById("dImg").onclick=function(){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=this.src;
};

document.getElementById("modal").onclick=function(){
this.style.display="none";
};
</script>

</body>
</html>
