<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAYWAY</title>

<style>
:root{
  --black:#0a0a0a;
  --dark:#111;
  --cream:#e6d3b3;
  --white:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  background:var(--black);
  color:var(--white);
}

/* NAV */
header{
  position:fixed;
  width:100%;
  z-index:1000;
}

.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo{
  font-weight:bold;
  letter-spacing:3px;
  font-size:18px;
}

.menu{
  display:flex;
  gap:25px;
}

.menu a{
  text-decoration:none;
  color:white;
  font-size:13px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 40px;
}

.hero h1{
  font-size:80px;
  line-height:0.9;
}

.hero span{
  color:var(--cream);
}

.hero p{
  margin-top:20px;
  color:#aaa;
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 30px;
  background:var(--cream);
  border:none;
  cursor:pointer;
}

/* SECTION */
section{
  padding:100px 40px;
}

/* GRID PRODUK */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.product{
  position:relative;
  overflow:hidden;
}

.product img{
  width:100%;
  height:400px;
  object-fit:cover;
  transition:0.5s;
}

.product:hover img{
  transform:scale(1.1);
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  background:linear-gradient(transparent, black);
}

.overlay h3{
  font-size:18px;
}

.price{
  color:var(--cream);
  font-weight:bold;
}

/* BIG TEXT SECTION */
.banner{
  font-size:60px;
  font-weight:bold;
  text-align:center;
  line-height:1.2;
}

.banner span{
  color:var(--cream);
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  color:#aaa;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:40px;}
.products{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="nav">
    <div class="logo">HAYWAY</div>
    <div class="menu">
      <a href="#">HOME</a>
      <a href="#">SHOP</a>
      <a href="#">CONTACT</a>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>WEAR<br><span>YOUR</span><br>ATTITUDE</h1>
    <p>Streetwear built for identity</p>
    <button class="btn">SHOP NOW</button>
  </div>
</section>

<!-- BANNER -->
<section class="banner">
  BUILT FOR THE <span>STREETS</span>
</section>

<!-- PRODUK -->
<section>
  <div class="products">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
      <div class="overlay">
        <h3>Oversize Hoodie</h3>
        <p class="price">Rp 250.000</p>
      </div>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
      <div class="overlay">
        <h3>Street T-Shirt</h3>
        <p class="price">Rp 150.000</p>
      </div>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
      <div class="overlay">
        <h3>Cargo Outfit</h3>
        <p class="price">Rp 300.000</p>
      </div>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 HAYWAY — STREETWEAR BRAND</p>
</footer>

</body>
</html>
