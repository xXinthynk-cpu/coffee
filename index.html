<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAYWAY STORE</title>

<style>
:root {
  --dark:#0d0d0d;
  --dark2:#1a1a1a;
  --cream:#e6d3b3;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:var(--dark);color:white;}
html{scroll-behavior:smooth}

/* NAV */
header{position:fixed;width:100%;background:#000a;backdrop-filter:blur(10px);}
.navbar{display:flex;justify-content:space-between;padding:18px 40px;}
.logo{color:var(--cream);font-weight:bold;}

.nav-links{display:flex;gap:20px;}
.nav-links a{color:white;text-decoration:none;}

.hamburger{display:none;flex-direction:column;}
.hamburger span{width:25px;height:3px;background:white;margin:4px}

/* HERO */
.hero{
  height:100vh;
  background:linear-gradient(#000a,#000f),
  url('https://images.unsplash.com/photo-1491553895911-0055eca6402d');
  display:flex;justify-content:center;align-items:center;text-align:center;
}
.hero h1{color:var(--cream);font-size:50px;}

/* BUTTON */
.btn{
  background:var(--cream);
  padding:10px 20px;
  border:none;
  cursor:pointer;
}

/* SECTION */
section{padding:100px 40px;text-align:center}

/* FORM */
.form-box input, .form-box textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
  background:var(--dark2);
  border:none;
  color:white;
}

/* UPLOAD */
.upload-box{
  border:2px dashed var(--cream);
  padding:20px;
  margin:20px 0;
  cursor:pointer;
}

/* CARD */
.gallery{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  display:flex;
  background:var(--dark2);
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:40%;
  height:250px;
  object-fit:cover;
  cursor:pointer;
  transition:0.3s;
}

.card img:hover{opacity:0.8;}

.card-content{
  padding:20px;
  width:60%;
  text-align:left;
}

.price{
  color:var(--cream);
  font-weight:bold;
  margin-top:10px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  z-index:2000;
  left:0;top:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.modal img{
  max-width:80%;
  max-height:80%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}

/* FOOTER */
footer{
  background:#000;
  padding:40px;
  text-align:center;
}

/* MOBILE */
@media(max-width:768px){
.nav-links{
  position:absolute;top:60px;right:0;width:100%;
  background:black;flex-direction:column;display:none;
}
.nav-links.active{display:flex;}
.hamburger{display:flex;}

.card{
  flex-direction:column;
}
.card img{width:100%;}
.card-content{width:100%;}
}
</style>
</head>

<body>

<header>
<div class="navbar">
<div class="logo">HAYWAY</div>

<div class="nav-links" id="navLinks">
<a href="#home">Home</a>
<a href="#gallery">Produk</a>
<a href="#contact">Contact</a>
</div>

<div class="hamburger" id="hamburger">
<span></span><span></span><span></span>
</div>
</div>
</header>

<section class="hero" id="home">
<h1>HAYWAY STORE</h1>
</section>

<section id="gallery">
<h2 style="color:var(--cream)">Produk</h2>

<div class="form-box">
<input id="desc" placeholder="Deskripsi produk">
<input id="quality" placeholder="Kualitas bahan">
<textarea id="detail" placeholder="Penjelasan bahan"></textarea>
<input id="price" placeholder="Harga">
</div>

<div class="upload-box" id="uploadBox">
Upload Gambar
<input type="file" id="fileInput" hidden>
</div>

<div class="gallery" id="gallery"></div>
</section>

<section id="contact">
<h2 style="color:var(--cream)">Contact</h2>
<input placeholder="Nama">
<input placeholder="Email">
<textarea placeholder="Pesan"></textarea>
<button class="btn">Kirim</button>
</section>

<footer>
<h3>HAYWAY</h3>
<p>Streetwear Brand</p>
</footer>

<!-- MODAL -->
<div class="modal" id="modal">
<span class="close" id="close">&times;</span>
<img id="modalImg">
</div>

<script>
// NAV
const hamburger=document.getElementById("hamburger");
const navLinks=document.getElementById("navLinks");
hamburger.onclick=()=>navLinks.classList.toggle("active");

// ELEMENT
const uploadBox=document.getElementById("uploadBox");
const fileInput=document.getElementById("fileInput");
const gallery=document.getElementById("gallery");

uploadBox.onclick=()=>fileInput.click();

// MODAL
const modal=document.getElementById("modal");
const modalImg=document.getElementById("modalImg");
const close=document.getElementById("close");

close.onclick=()=>modal.style.display="none";

// UPLOAD
fileInput.onchange=()=>{
  const file=fileInput.files[0];
  const reader=new FileReader();
  reader.onload=e=>addProduct(e.target.result);
  reader.readAsDataURL(file);
};

function addProduct(img){
  const desc=document.getElementById("desc").value;
  const quality=document.getElementById("quality").value;
  const detail=document.getElementById("detail").value;
  const price=document.getElementById("price").value;

  const card=document.createElement("div");
  card.className="card";

  card.innerHTML=`
    <img src="${img}">
    <div class="card-content">
      <h3>${desc}</h3>
      <p><b>Kualitas:</b> ${quality}</p>
      <p>${detail}</p>
      <p class="price">Rp ${price}</p>

      <a href="https://wa.me/6281234567890?text=Saya tertarik dengan ${desc} harga Rp ${price}">
        <button class="btn">Order</button>
      </a>

      <button class="btn" style="background:red;margin-top:10px;">Hapus</button>
    </div>
  `;

  // DELETE
  card.querySelectorAll(".btn")[1].onclick=()=>card.remove();

  // POPUP IMAGE
  card.querySelector("img").onclick=()=>{
    modal.style.display="flex";
    modalImg.src=img;
  };

  gallery.appendChild(card);
}
</script>

</body>
</html>
