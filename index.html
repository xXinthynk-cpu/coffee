<style>
/* ===== ASYMMETRICAL GRID ===== */
.products{
  display:grid;
  grid-template-columns:2fr 1fr;
  grid-template-rows:300px 300px;
  gap:20px;
}

/* ITEM */
.product{
  position:relative;
  overflow:hidden;
}

/* BESAR (highlight product) */
.product.big{
  grid-row:1 / span 2;
}

/* GAMBAR */
.product img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.6s;
}

.product:hover img{
  transform:scale(1.1);
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  background:linear-gradient(transparent, rgba(0,0,0,0.9));
}

.overlay h3{
  font-size:20px;
}

.price{
  color:var(--cream);
  font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){
  .products{
    grid-template-columns:1fr;
    grid-template-rows:auto;
  }

  .product.big{
    grid-row:auto;
  }
}
</style>

<section class="fade">
  <div class="products">

    <!-- PRODUK BESAR -->
    <div class="product big">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
      <div class="overlay">
        <h3>Signature Hoodie</h3>
        <p class="price">Rp 300.000</p>
      </div>
    </div>

    <!-- PRODUK KECIL -->
    <div class="product">
      <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
      <div class="overlay">
        <h3>Street Tee</h3>
        <p class="price">Rp 150.000</p>
      </div>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
      <div class="overlay">
        <h3>Cargo Style</h3>
        <p class="price">Rp 280.000</p>
      </div>
    </div>

  </div>
</section>
