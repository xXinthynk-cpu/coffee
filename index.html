<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Kopi Nusantara - Shop</title>

  <style>
    body { margin:0; font-family:Arial; background:#0e0e0e; color:#fff; }
    header { padding:40px; text-align:center; background:#000; }
    h1 { margin:0; }

    .container { max-width:1100px; margin:auto; padding:20px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card {
      background:#1a1a1a;
      padding:15px;
      border-radius:15px;
      text-align:center;
    }

    .card img { width:100%; border-radius:10px; }

    button {
      margin-top:10px;
      padding:10px;
      border:none;
      background:#c59d5f;
      color:#000;
      font-weight:bold;
      cursor:pointer;
      border-radius:8px;
    }

    .cart {
      position:fixed;
      right:0;
      top:0;
      width:300px;
      height:100vh;
      background:#111;
      padding:20px;
      overflow:auto;
      border-left:2px solid #333;
    }

    .cart h2 { margin-top:0; }

    .cart-item {
      margin-bottom:10px;
      border-bottom:1px solid #333;
      padding-bottom:10px;
    }

    .checkout {
      background:#25D366;
      color:#000;
      width:100%;
      margin-top:20px;
    }
  </style>
</head>
<body>

<header>
  <h1>☕ Kopi Nusantara Shop</h1>
</header>

<div class="container">
  <div class="grid" id="product-list">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
      <h3>Arabica Gayo</h3>
      <p>Rp 75.000</p>
      <button onclick="addToCart('Arabica Gayo',75000)">Tambah</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1504754524776-8f4f37790ca0">
      <h3>Robusta Lampung</h3>
      <p>Rp 55.000</p>
      <button onclick="addToCart('Robusta Lampung',55000)">Tambah</button>
    </div>

  </div>
</div>
