<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dark Landing Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f0f0f;
      color: #fff;
    }

    /* NAVBAR */
    header {
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #00ffcc;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      text-decoration: none;
      color: #fff;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #00ffcc;
    }

    /* HAMBURGER */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
    }

    .hamburger span {
      width: 25px;
      height: 3px;
      background: #fff;
      margin: 4px 0;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #aaa;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 20px;
      background: #00ffcc;
      color: #000;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ccaa;
    }

    /* SECTION */
    section {
      padding: 80px 30px;
      text-align: center;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      margin: 15px;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
    }

    /* CONTACT */
    .contact form {
      max-width: 400px;
      margin: auto;
    }

    .contact input, .contact textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #222;
      border: none;
      color: #fff;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .nav-links {
        position: absolute;
        top: 60px;
        right: 0;
        background: #000;
        width: 100%;
        flex-direction: column;
        text-align: center;
        display: none;
      }

      .nav-links.active {
        display: flex;
      }

      .hamburger {
        display: flex;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <div class="navbar">
      <div class="logo">Brand</div>

      <div class="nav-links" id="navLinks">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
      </div>

      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero" id="home">
    <div>
      <h1>Dark Modern Landing Page</h1>
      <p>Simple, clean, and powerful design for your brand</p>
      <button class="btn">Get Started</button>
    </div>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <h2>About</h2>
    <p>This is a modern dark landing page for your business.</p>
  </section>

  <!-- SERVICES -->
  <section id="services">
    <h2>Services</h2>
    <div class="card">Design</div>
    <div class="card">Branding</div>
    <div class="card">Development</div>
  </section>

  <!-- CONTACT -->
  <section class="contact" id="contact">
    <h2>Contact</h2>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea rows="5" placeholder="Message"></textarea>
      <button class="btn">Send</button>
    </form>
  </section>

  <!-- JS -->
  <script>
    const hamburger = document.getElementById("hamburger");
    const navLinks = document.getElementById("navLinks");

    hamburger.addEventListener("click", () => {
      navLinks.classList.toggle("active");
    });
  </script>

</body>
</html>
