<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Dark Landing</title>

<style>
:root {
  --dark: #0d0d0d;
  --dark2: #1a1a1a;
  --cream: #e6d3b3;
  --accent: #c2a27c;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--dark);
  color: #fff;
}

/* NAVBAR */
header {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(13,13,13,0.7);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 18px 40px;
  align-items: center;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: var(--cream);
}

.nav-links {
  display: flex;
  gap: 25px;
}

.nav-links a {
  color: #fff;
  text-decoration: none;
  position: relative;
}

/* underline hover */
.nav-links a::after {
  content: "";
  position: absolute;
  width: 0;
  height: 2px;
  background: var(--cream);
  left: 0;
  bottom: -5px;
  transition: 0.3s;
}

.nav-links a:hover::after {
  width: 100%;
}

/* HAMBURGER */
.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
}

.hamburger span {
  width: 25px;
  height: 3px;
  background: white;
  margin: 4px;
  transition: 0.4s;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
              url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-size: 52px;
  color: var(--cream);
}

.hero p {
  color: #ccc;
  margin: 15px 0;
}

.btn {
  padding: 12px 25px;
  background: var(--cream);
  color: black;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: var(--accent);
}

/* SECTION */
section {
  padding: 100px 40px;
  text-align: center;
}

.card {
  background: var(--dark2);
  padding: 25px;
  margin: 15px;
  border-radius: 12px;
  display: inline-block;
  width: 260px;
  transition: 0.4s;
  border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
  transform: translateY(-10px);
  border-color: var(--cream);
}

/* ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* CONTACT */
input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  background: var(--dark2);
  border: none;
  color: white;
}

/* MOBILE */
@media(max-width:768px) {
  .nav-links {
    position: absolute;
    top: 70px;
    right: 0;
    width: 100%;
    background: var(--dark);
    flex-direction: column;
    display: none;
    text-align: center;
  }

  .nav-links.active {
    display: flex;
  }

  .hamburger {
    display: flex;
  }
}
</style>
</head>

<body>

<header>
  <div class="navbar">
    <div class="logo">HAYWAY</div>

    <div class="nav-links" id="navLinks">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#services">Services</a>
      <a href="#contact">Contact</a>
    </div>

    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero" id="home">
  <div>
    <h1>Elegant Dark Brand</h1>
    <p>Build your premium identity</p>
    <a href="#contact">
      <button class="btn">Start Now</button>
    </a>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="fade">
  <h2 style="color: var(--cream)">About</h2>
  <p>We create modern and premium branding visuals.</p>
</section>

<!-- SERVICES -->
<section id="services" class="fade">
  <h2 style="color: var(--cream)">Services</h2>
  <div class="card">Photography</div>
  <div class="card">Streetwear</div>
  <div class="card">Branding</div>
</section>

<!-- CONTACT -->
<section id="contact" class="fade">
  <h2 style="color: var(--cream)">Contact</h2>
  <form>
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button class="btn">Send</button>
  </form>
</section>

<script>
/* HAMBURGER */
const hamburger = document.getElementById("hamburger");
const navLinks = document.getElementById("navLinks");

hamburger.addEventListener("click", () => {
  navLinks.classList.toggle("active");
});

/* SCROLL ANIMATION */
const fades = document.querySelectorAll(".fade");

window.addEventListener("scroll", () => {
  fades.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add("show");
    }
  });
});
</script>

</body>
</html>
