<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAYWAY STORE</title>

<style>
:root {
  --dark:#0d0d0d;
  --dark2:#1a1a1a;
  --cream:#e6d3b3;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:var(--dark);color:white;}
html{scroll-behavior:smooth}

/* NAV */
header{position:fixed;width:100%;background:#000a;backdrop-filter:blur(10px);}
.navbar{display:flex;justify-content:space-between;padding:18px 40px;}
.logo{color:var(--cream);font-weight:bold;}

.nav-links{display:flex;gap:20px;}
.nav-links a{color:white;text-decoration:none;}

.hamburger{display:none;flex-direction:column;}
.hamburger span{width:25px;height:3px;background:white;margin:4px}

/* HERO */
.hero{
  height:100vh;
  background:linear-gradient(#000a,#000f),
  url('https://images.unsplash.com/photo-1491553895911-0055eca6402d');
  display:flex;justify-content:center;align-items:center;text-align:center;
}
.hero h1{color:var(--cream);font-size:50px;}

.btn{background:var(--cream);padding:10px 20px;border:none;cursor:pointer}

/* SECTION */
section{padding:100px 40px;text-align:center}

/* UPLOAD */
.upload-box{
  border:2px dashed var(--cream);
  padding:20px;
  margin-bottom:20px;
  cursor:pointer;
}

/* FORM */
.form-box{
  margin-bottom:20px;
}
.form-box input, .form-box textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
  background:var(--dark2);
  border:none;
  color:white;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:var(--dark2);
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card-content{
  padding:15px;
  text-align:left;
}

.price{
  color:var(--cream);
  font-weight:bold;
}

/* DELETE */
.delete-btn{
  background:red;
  border:none;
  color:white;
  padding:5px;
  cursor:pointer;
  margin-top:10px;
}

/* FOOTER */
footer{
  background:#000;
  padding:40px;
  text-align:center;
}

footer h3{color:var(--cream);}
footer p{color:#aaa;margin:5px 0;}

/* MOBILE */
@media(max-width:768px){
.nav-links{
  position:absolute;top:60px;right:0;width:100%;
  background:black;flex-direction:column;display:none;
}
.nav-links.active{display:flex;}
.hamburger{display:flex;}
}
</style>
</head>

<body>

<header>
<div class="navbar">
<div class="logo">HAYWAY</div>

<div class="nav-links" id="navLinks">
<a href="#home">Home</a>
<a href="#gallery">Produk</a>
<a href="#contact">Contact</a>
</div>

<div class="hamburger" id="hamburger">
<span></span><span></span><span></span>
</div>
</div>
</header>

<!-- HERO -->
<section class="hero" id="home">
<div>
<h1>HAYWAY STORE</h1>
<p>Premium Streetwear</p>
</div>
</section>

<!-- GALLERY -->
<section id="gallery">
<h2 style="color:var(--cream)">Produk</h2>

<div class="form-box">
<input id="desc" placeholder="Deskripsi produk">
<input id="quality" placeholder="Kualitas bahan (misal: Premium Cotton)">
<textarea id="detail" placeholder="Penjelasan bahan"></textarea>
<input id="price" placeholder="Harga">
</div>

<div class="upload-box" id="uploadBox">
Upload Gambar
<input type="file" id="fileInput" hidden>
</div>

<div class="gallery" id="gallery"></div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2 style="color:var(--cream)">Contact</h2>
<input placeholder="Nama">
<input placeholder="Email">
<textarea placeholder="Pesan"></textarea>
<button class="btn">Kirim</button>
</section>

<!-- FOOTER -->
<footer>
<h3>HAYWAY</h3>
<p>Streetwear Brand Indonesia</p>
<p>Instagram: @hayway</p>
<p>WhatsApp: 08123456789</p>
<p>© 2026 All Rights Reserved</p>
</footer>

<script>
// NAV
const hamburger=document.getElementById("hamburger");
const navLinks=document.getElementById("navLinks");
hamburger.onclick=()=>navLinks.classList.toggle("active");

// ELEMENT
const uploadBox=document.getElementById("uploadBox");
const fileInput=document.getElementById("fileInput");
const gallery=document.getElementById("gallery");

uploadBox.onclick=()=>fileInput.click();

fileInput.onchange=()=>{
  const file=fileInput.files[0];
  const reader=new FileReader();
  reader.onload=e=>{
    addProduct(e.target.result);
  }
  reader.readAsDataURL(file);
}

function addProduct(img){
  const desc=document.getElementById("desc").value;
  const quality=document.getElementById("quality").value;
  const detail=document.getElementById("detail").value;
  const price=document.getElementById("price").value;

  const card=document.createElement("div");
  card.className="card";

  card.innerHTML=`
    <img src="${img}">
    <div class="card-content">
      <h4>${desc}</h4>
      <p><b>Kualitas:</b> ${quality}</p>
      <p>${detail}</p>
      <p class="price">Rp ${price}</p>
      <button class="delete-btn">Hapus</button>
    </div>
  `;

  card.querySelector(".delete-btn").onclick=()=>card.remove();

  gallery.appendChild(card);
}
</script>

</body>
</html>
